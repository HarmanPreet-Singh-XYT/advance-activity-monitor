name: device_activity_monitor
description: Monitors audio output, HID devices, and game controllers for user activity. Companion plugin to window_focus for screen-time inactivity detection.
version: 0.0.1
homepage:

environment:
  sdk: ^3.10.7
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: DeviceActivityMonitorPlugin
        fileName: device_activity_monitor_plugin.h
      macos:
        pluginClass: DeviceActivityMonitorPlugin
 

